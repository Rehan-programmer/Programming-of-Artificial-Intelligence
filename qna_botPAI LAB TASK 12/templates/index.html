<!DOCTYPE html>
<html>
<head>
    <title>QnA Bot</title>
</head>
<body>
    <h2>Ask Question</h2>
    <form method="post">
        <input type="text" name="query" required>
        <button type="submit">Search</button>
    </form>

    <h3>Results:</h3>
    {% for r in results %}
        <p>{{ r }}</p>
    {% endfor %}
</body>
</html>
